<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Sign In</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>TaskFlow</h1>
      <p class="subtitle">Team task management made simple</p>

      <div class="tabs">
        <button class="tab-btn active" data-tab="loginPanel">Sign In</button>
        <button class="tab-btn" data-tab="registerPanel">Create Account</button>
      </div>

      <!-- Login -->
      <div id="loginPanel" class="tab-panel">
        <div id="loginError" class="alert alert-error hidden"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" placeholder="••••••••" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <p style="margin-top:16px;font-size:12px;color:var(--gray-400);text-align:center">
          Admin: admin@taskflow.com / Admin@123456
        </p>
      </div>

      <!-- Register -->
      <div id="registerPanel" class="tab-panel hidden">
        <div id="registerError" class="alert alert-error hidden"></div>
        <form id="registerForm">
          <div class="form-row">
            <div class="form-group">
              <label for="regFirstName">First Name</label>
              <input id="regFirstName" type="text" placeholder="Jane" required />
            </div>
            <div class="form-group">
              <label for="regLastName">Last Name</label>
              <input id="regLastName" type="text" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label for="regEmail">Email</label>
            <input id="regEmail" type="email" placeholder="you@example.com" required autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="regPassword">Password</label>
            <input id="regPassword" type="password" placeholder="Min 6 chars, upper, number, symbol" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
